server:
    interface: 103.55.253.251
    port: 53

    access-control: 127.0.0.0/8 allow
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow
    access-control: 103.55.252.0/23 allow

    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    num-threads: 4
    so-reuseport: yes

    msg-cache-size: 512m
    rrset-cache-size: 1024m
    key-cache-size: 128m
    neg-cache-size: 256m

    prefetch: yes
    prefetch-key: yes
    serve-expired: yes
    serve-expired-ttl: 3600

    minimal-responses: yes
    hide-identity: yes
    hide-version: yes
    qname-minimisation: yes

    module-config: "respip validator iterator"

    verbosity: 1
    statistics-interval: 0
    statistics-cumulative: yes
    extended-statistics: yes

    include: "/etc/unbound/local.d/*.conf"

remote-control:
    control-enable: yes
    control-interface: 127.0.0.1

# Native RPZ AXFR attempt from BIND hidden slave.
# Kept here as reference; if zone transfer does not create zonefile on distro build,
# use generated local-zone include under /etc/unbound/local.d/.
rpz:
    name: "trustpositifkominfo"
    master: 103.55.253.253
    zonefile: "/var/lib/unbound/trustpositifkominfo.zone"
    rpz-log: yes
    rpz-log-name: "kominfo"
